services:
  frontend:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - api

  api:
    image: node:18
    working_dir: /app
    volumes:
      - ./mock:/app
    command: sh -c "npm install -g json-server && json-server --watch db.json --host 0.0.0.0 --port 4000"
    ports:
      - "4000:4000"